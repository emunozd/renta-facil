services:
  renta-facil:
    build: .
    container_name: renta-facil
    restart: unless-stopped

    # El contenedor necesita llegar a tu Qwen local en el host
    # extra_hosts mapea "host.docker.internal" → IP del host (funciona en Linux)
    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      # Telegram
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}

      # Apunta al Qwen corriendo en el HOST (no dentro de Docker)
      - AI_BASE_URL=http://host.docker.internal:8181
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-mlx-community/Qwen3.5-35B-A3B-4bit}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-4096}
      - AI_TIMEOUT_SECONDS=${AI_TIMEOUT_SECONDS:-120}

      # Rutas DENTRO del contenedor (no cambiar)
      - PDF_FORMULARIO_PATH=/data/renta-facil/formulario_210.pdf
      - CHROMA_PERSIST_DIR=/data/renta-facil/chroma
      - DB_PATH=/data/renta-facil/sesiones.db

      # RAG
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      - RAG_TOP_K=${RAG_TOP_K:-5}
      - PDF_WATCH_INTERVAL=${PDF_WATCH_INTERVAL:-300}

      # Limites
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-20}
      # Zona horaria
      - TZ=America/Bogota

    volumes:
      # /data/renta-facil del host → /data/renta-facil del contenedor
      # PDF, índice ChromaDB y sesiones.db viven aquí
      - /data/renta-facil:/data/renta-facil

    # Solo si quieres ver los logs con docker logs -f renta-facil
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
